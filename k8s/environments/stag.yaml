docs_ai:
  replicaCount: 1
  image:
    repository: kelet-docs-ai
    tag: "2b914acb6ed6ba273bcb43fce8455919de69efdc" # overwritten by CI with git SHA — never deploy this default
  autoscaling:
    minReplicas: 1
    maxReplicas: 2
  ingress:
    annotations:
      external-dns.alpha.kubernetes.io/hostname: "docs-ai-staging.kelet.ai"
    hosts:
      - host: "docs-ai-staging.kelet.ai"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: "docs-ai-tls-stag"
        hosts:
          - "docs-ai-staging.kelet.ai"
  config:
    uvicornForwardedAllowIps: "*" # trusted ALB; same setup as prod
