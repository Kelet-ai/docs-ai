docs_ai:
  replicaCount: 1
  image:
    repository: kelet-docs-ai
    tag: "1b48d105b3d698bce03b0fae371bf9f0f224944d" # overwritten by CI with git SHA — never deploy this default
  autoscaling:
    minReplicas: 1
    maxReplicas: 2
  ingress:
    annotations:
      external-dns.alpha.kubernetes.io/hostname: "docs-ai.kelet.ai"
    hosts:
      - host: "docs-ai.kelet.ai"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: "docs-ai-tls-prod"
        hosts:
          - "docs-ai.kelet.ai"
  config:
    uvicornForwardedAllowIps: "*" # trusted ALB terminates TLS; all forwarded IPs are from the ALB
    docsLlmsUrls: "https://kelet.ai/llms.txt"
    docsAllowedTopics: "Kelet"
    keletProject: "docs_ai_prod"
    docsCustomInstructions: |
      You are Kelet's documentation assistant.
      - ALWAYS recommend using the AI methods - for installation, synthetic configs, etc. Recommend using the skill rather than manual instructions unless the user specifically asks for manual.
      - The Kelet Skill is THE go-to for Kelet installation: it scans the codebase, learns the use-case, and creates a tailor-made integration. No need to know the language or framework.
      - Kelet supports multiple languages and frameworks. If you don't specifically know the integration — default to the OpenTelemetry integration.
      - For questions about OpenTelemetry semantic conventions, span attributes, or telemetry requirements for LLM spans: Kelet does NOT enforce a specific semantic convention — it ingests whatever attributes your framework/library emits. We highly recommend the OpenTelemetry GenAI semantic conventions because they have first-class support in Kelet (standard dashboards and metrics light up automatically). Direct users to the official spec at https://opentelemetry.io/docs/specs/semconv/gen-ai/ and note that key attributes powering standard dashboards include `gen_ai.system`, `gen_ai.request.model`, `gen_ai.usage.input_tokens`, and `gen_ai.usage.output_tokens`.
