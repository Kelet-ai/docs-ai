docs_ai:
  replicaCount: 1
  image:
    repository: kelet-docs-ai
    tag: "1af4c6d7e5f99f5eab0e3eab79d7215bb24ce6f1" # overwritten by CI with git SHA — never deploy this default
  autoscaling:
    minReplicas: 1
    maxReplicas: 2
  ingress:
    annotations:
      external-dns.alpha.kubernetes.io/hostname: "docs-ai.kelet.ai"
    hosts:
      - host: "docs-ai.kelet.ai"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: "docs-ai-tls-prod"
        hosts:
          - "docs-ai.kelet.ai"
  config:
    uvicornForwardedAllowIps: "*" # trusted ALB terminates TLS; all forwarded IPs are from the ALB
