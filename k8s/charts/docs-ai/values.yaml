replicaCount: 1

image:
  registry: ""        # injected by ArgoCD via infra values override
  repository: kelet-docs-ai
  pullPolicy: IfNotPresent
  tag: "0.0.0"        # overwritten by CI with git SHA — never deploy this default

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 8001

ingress:
  enabled: true
  className: "alb"
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '3'
  hosts:
    - host: ""   # set by environment
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector:
  kubernetes.io/arch: amd64

tolerations: []
affinity: {}

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

config:
  port: 8001
  docsLlmsUrls: ""  # required — set to your llms.txt URL(s), e.g. "https://yoursite.com/llms.txt"
  docsAllowedHosts: ""  # space-separated hostnames/wildcards (e.g. "*.example.com"); empty = auto-derive from docsLlmsUrls
  docsAiModel: "bedrock:global.anthropic.claude-sonnet-4-6"
  docsRefreshIntervalSeconds: 3600
  rateLimitMessagesPerWindow: 20
  rateLimitWindowSeconds: 3600
  sessionTtlSeconds: 1800
  # Set to the ALB CIDR or "*" (only safe behind a trusted load balancer) so uvicorn
  # resolves the real client IP from X-Forwarded-For for accurate per-IP rate limiting.
  # Leaving this empty disables proxy header trust — rate limit will use the pod network IP.
  uvicornForwardedAllowIps: ""  # override in environment values (e.g. prod.yaml)
  awsDefaultRegion: "eu-central-1"
  # Topic restriction injected into the system prompt. Set to your product/org name (e.g. "MyProduct").
  # Defaults to "scanned docs" — strictly refuses off-topic questions out of the box.
  docsAllowedTopics: "scanned docs"
  # Org-specific instructions appended to the base system prompt.
  # Use for brand identity, product-specific recommendations, tone guidelines, etc.
  # For multiline values, set this as a block scalar in your environment overlay (prod.yaml / stag.yaml),
  # not here in values.yaml — the Helm `quote` filter requires a pre-flattened string.
  docsCustomInstructions: ""
  # Path to a custom Jinja2 template file that fully replaces the built-in system prompt.
  # Mount via a ConfigMap volume and set this to the mounted path. Can also use {{ custom_instructions }} and {{ allowed_topics }}.
  docsSystemPromptFile: ""

