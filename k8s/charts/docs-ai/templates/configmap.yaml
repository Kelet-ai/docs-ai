apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kelet-docs-ai.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kelet-docs-ai.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.config.port | quote }}
  DOCS_LLMS_URLS: {{ .Values.config.docsLlmsUrls | quote }}
  DOCS_ALLOWED_HOSTS: {{ .Values.config.docsAllowedHosts | quote }}
  DOCS_AI_MODEL: {{ .Values.config.docsAiModel | quote }}
  DOCS_REFRESH_INTERVAL_SECONDS: {{ .Values.config.docsRefreshIntervalSeconds | quote }}
  RATE_LIMIT_MESSAGES_PER_WINDOW: {{ .Values.config.rateLimitMessagesPerWindow | quote }}
  RATE_LIMIT_WINDOW_SECONDS: {{ .Values.config.rateLimitWindowSeconds | quote }}
  SESSION_TTL_SECONDS: {{ .Values.config.sessionTtlSeconds | quote }}
  UVICORN_FORWARDED_ALLOW_IPS: {{ .Values.config.uvicornForwardedAllowIps | quote }}
  AWS_DEFAULT_REGION: {{ .Values.config.awsDefaultRegion | quote }}
  DOCS_ALLOWED_TOPICS: {{ .Values.config.docsAllowedTopics | quote }}
  DOCS_CUSTOM_INSTRUCTIONS: {{ .Values.config.docsCustomInstructions | quote }}
  DOCS_SYSTEM_PROMPT_FILE: {{ .Values.config.docsSystemPromptFile | quote }}
  # REDIS_HOST is populated at deploy time by an ACK FieldExport from the ElastiCache resource.
  # It must be set before the pod can connect to Redis.
  REDIS_HOST: ""
  REDIS_PORT: "6379"
