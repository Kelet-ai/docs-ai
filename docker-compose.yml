services:
  docs-ai:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - ./src:/svc/src
      - ./app:/svc/app
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
